<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파일 보관함</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #6c63ff;
    --accent2: #48cfad;
    --danger: #ff6b6b;
    --text: #e8eaf0;
    --text2: #8b90a7;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 헤더 */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-info {
    font-size: 12px;
    color: var(--text2);
  }

  /* 메인 */
  .main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  /* 업로드 존 */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    margin-bottom: 24px;
    position: relative;
  }
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 48px; margin-bottom: 12px; }
  .upload-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .upload-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .upload-btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: inherit;
    pointer-events: none;
  }

  /* 진행 바 */
  .progress-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .progress-bar-bg { background: var(--surface2); border-radius: 999px; height: 6px; }
  .progress-bar { background: var(--accent); height: 6px; border-radius: 999px; width: 0%; transition: width 0.3s; }

  /* 폴더/필터 */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .folder-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .folder-tab {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
    font-family: inherit;
  }
  .folder-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .folder-tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }
  .add-folder-btn {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    border: 1px dashed var(--border);
    background: none;
    color: var(--text2);
    font-family: inherit;
    transition: all 0.15s;
  }
  .add-folder-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .search-wrap {
    position: relative;
  }
  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px 7px 32px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    width: 180px;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text2); pointer-events: none; }

  /* 파일 목록 */
  .file-list { display: flex; flex-direction: column; gap: 8px; }
  .file-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s;
  }
  .file-item:hover { border-color: var(--accent); }
  .file-icon { font-size: 28px; flex-shrink: 0; width: 36px; text-align: center; }
  .file-img-thumb {
    width: 48px; height: 48px; object-fit: cover;
    border-radius: 6px; flex-shrink: 0;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .file-meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; flex-wrap: wrap; }
  .file-folder-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 999px;
    background: rgba(108,99,255,0.2); color: var(--accent);
  }
  .file-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .file-btn {
    padding: 6px 12px; border-radius: 6px; font-size: 12px;
    border: 1px solid var(--border); background: none;
    color: var(--text2); cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .file-btn:hover { border-color: var(--accent); color: var(--text); }
  .file-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* 빈 상태 */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text2); font-size: 14px;
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* 모달 */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 999;
    align-items: center; justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 340px;
    max-width: 95vw;
  }
  .modal h3 { font-size: 15px; margin-bottom: 16px; }
  .modal input {
    width: 100%; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    font-family: inherit; outline: none; margin-bottom: 14px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-primary {
    padding: 8px 20px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 13px;
    cursor: pointer; font-family: inherit; font-weight: 500;
  }
  .btn-cancel {
    padding: 8px 20px; background: none; color: var(--text2);
    border: 1px solid var(--border); border-radius: 8px; font-size: 13px;
    cursor: pointer; font-family: inherit;
  }

  /* 이미지 미리보기 */
  .preview-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 9999;
    align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  .preview-overlay.visible { display: flex; }
  .preview-overlay img { max-width: 92vw; max-height: 92vh; border-radius: 8px; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; z-index: 9999; transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--accent2); }
  .toast.error { border-color: var(--danger); }

  /* 반응형 */
  @media (max-width: 600px) {
    .file-btn span { display: none; }
    .search-input { width: 130px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">📦 파일 보관함</div>
  <div class="header-info" id="storage-info">로딩 중...</div>
</div>

<div class="main">

  <!-- 업로드 존 -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" multiple accept="*/*">
    <div class="upload-icon">☁️</div>
    <div class="upload-title">파일을 드래그하거나 클릭해서 업로드</div>
    <div class="upload-sub">이미지, 문서, 동영상 등 모든 파일 지원 · 최대 50MB</div>
    <button class="upload-btn">📁 파일 선택</button>
  </div>

  <!-- 진행 바 -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label" id="progress-label">업로드 중...</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <!-- 툴바 -->
  <div class="toolbar">
    <div class="folder-tabs" id="folder-tabs"></div>
    <button class="add-folder-btn" onclick="openAddFolder()">+ 폴더 추가</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="search-input" placeholder="파일 검색..." oninput="renderFileList()">
    </div>
  </div>

  <!-- 파일 목록 -->
  <div class="file-list" id="file-list"></div>
</div>

<!-- 폴더 추가 모달 -->
<div class="modal-overlay" id="folder-modal">
  <div class="modal">
    <h3>새 폴더 만들기</h3>
    <input type="text" id="folder-name-input" placeholder="폴더 이름" maxlength="30">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeFolderModal()">취소</button>
      <button class="btn-primary" onclick="addFolder()">만들기</button>
    </div>
  </div>
</div>

<!-- 파일 이동 모달 -->
<div class="modal-overlay" id="move-modal">
  <div class="modal">
    <h3>폴더로 이동</h3>
    <div id="move-folder-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('move-modal').classList.remove('visible')">취소</button>
    </div>
  </div>
</div>

<!-- 이미지 미리보기 -->
<div class="preview-overlay" id="preview-overlay" onclick="this.classList.remove('visible')">
  <img id="preview-img" src="">
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://mtppgluzuaucohugcwjn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10cHBnbHV6dWF1Y29odWdjd2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTU4NzUsImV4cCI6MjA5MTkzMTg3NX0.113Uz5DvRKYcEZqRWuRn7dI_qOSJII-iDkjDzskgdzk';
const BUCKET = 'files';

var folders = JSON.parse(localStorage.getItem('file_folders') || '["전체","기타"]');
var fileList = JSON.parse(localStorage.getItem('file_list') || '[]');
var currentFolder = '전체';
var moveTargetKey = null;

// 토스트
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'');
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// 파일 크기 포맷
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  return (bytes/(1024*1024)).toFixed(1) + 'MB';
}

// 파일 아이콘
function fileIcon(name) {
  var ext = (name.split('.').pop()||'').toLowerCase();
  if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return null; // 썸네일
  if (['mp4','mov','avi','mkv'].includes(ext)) return '🎬';
  if (['mp3','wav','aac'].includes(ext)) return '🎵';
  if (['pdf'].includes(ext)) return '📄';
  if (['doc','docx'].includes(ext)) return '📝';
  if (['xls','xlsx'].includes(ext)) return '📊';
  if (['ppt','pptx'].includes(ext)) return '📋';
  if (['zip','rar','7z'].includes(ext)) return '🗜️';
  return '📁';
}

function isImage(name) {
  var ext = (name.split('.').pop()||'').toLowerCase();
  return ['jpg','jpeg','png','gif','webp'].includes(ext);
}

// 저장
function save() {
  localStorage.setItem('file_folders', JSON.stringify(folders));
  localStorage.setItem('file_list', JSON.stringify(fileList));
}

// 폴더 탭 렌더
function renderFolders() {
  var el = document.getElementById('folder-tabs');
  el.innerHTML = '';
  folders.forEach(function(f) {
    var btn = document.createElement('button');
    btn.className = 'folder-tab' + (f === currentFolder ? ' active' : '');
    btn.textContent = f;
    btn.onclick = function() { currentFolder = f; renderFolders(); renderFileList(); };
    el.appendChild(btn);
  });
}

// 파일 목록 렌더
function renderFileList() {
  var el = document.getElementById('file-list');
  var q = document.getElementById('search-input').value.toLowerCase();
  var list = fileList.filter(function(f) {
    var inFolder = currentFolder === '전체' || f.folder === currentFolder;
    var inSearch = !q || f.name.toLowerCase().includes(q);
    return inFolder && inSearch;
  });

  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>파일이 없습니다</div>';
    return;
  }

  el.innerHTML = '';
  list.forEach(function(f) {
    var item = document.createElement('div');
    item.className = 'file-item';

    var icon = fileIcon(f.name);
    var imgHtml = '';
    if (!icon) {
      imgHtml = '<img class="file-img-thumb" src="' + f.url + '" onclick="previewImg(\'' + f.url + '\')" style="cursor:zoom-in;">';
    } else {
      imgHtml = '<div class="file-icon">' + icon + '</div>';
    }

    item.innerHTML = imgHtml +
      '<div class="file-info">' +
        '<div class="file-name" title="' + f.name + '">' + f.name + '</div>' +
        '<div class="file-meta">' +
          '<span>' + fmtSize(f.size) + '</span>' +
          '<span>' + f.date + '</span>' +
          (f.folder !== '기타' ? '<span class="file-folder-badge">' + f.folder + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="file-actions">' +
        '<button class="file-btn" onclick="moveFile(\'' + f.key + '\')">📂 <span>이동</span></button>' +
        '<button class="file-btn" onclick="downloadFile(\'' + f.url + '\',\'' + f.name + '\')">⬇ <span>다운</span></button>' +
        '<button class="file-btn danger" onclick="deleteFile(\'' + f.key + '\')">🗑 <span>삭제</span></button>' +
      '</div>';
    el.appendChild(item);
  });
}

// 업로드
function uploadFiles(files) {
  if (!files.length) return;
  var total = files.length;
  var done = 0;
  var pw = document.getElementById('progress-wrap');
  var pb = document.getElementById('progress-bar');
  var pl = document.getElementById('progress-label');
  pw.classList.add('visible');

  Array.from(files).forEach(function(file) {
    if (file.size > 50 * 1024 * 1024) {
      showToast(file.name + ' - 50MB 초과', 'error'); done++; return;
    }
    var safeName = file.name.replace(/[^a-zA-Z0-9ㄱ-ㅎ가-힣._-]/g, '_');
    var key = Date.now() + '_' + Math.random().toString(36).slice(2) + '_' + safeName;
    pl.textContent = file.name + ' 업로드 중...';
    var xhr = new XMLHttpRequest();
    xhr.open('POST', SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + key, true);
    xhr.setRequestHeader('apikey', SUPABASE_KEY);
    xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
    xhr.setRequestHeader('Content-Type', file.type || 'application/octet-stream');
    xhr.setRequestHeader('x-upsert', 'true');
    xhr.upload.onprogress = function(e) {
      if (e.lengthComputable) pb.style.width = Math.round(e.loaded/e.total*100) + '%';
    };
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      done++;
      pb.style.width = Math.round(done/total*100) + '%';
      if (xhr.status >= 200 && xhr.status < 300) {
        var url = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + key;
        var now = new Date();
        var dateStr = now.getFullYear() + '-' + ('0'+(now.getMonth()+1)).slice(-2) + '-' + ('0'+now.getDate()).slice(-2);
        fileList.unshift({ key: key, name: file.name, size: file.size, url: url, date: dateStr, folder: currentFolder === '전체' ? '기타' : currentFolder });
        save();
        showToast(file.name + ' 업로드 완료!', 'success');
      } else {
        showToast(file.name + ' 업로드 실패 (' + xhr.status + ': ' + xhr.responseText.slice(0,80) + ')', 'error');
        console.error('Upload error', xhr.status, xhr.responseText);
      }
      if (done === total) {
        setTimeout(function(){ pw.classList.remove('visible'); pb.style.width = '0%'; }, 800);
        renderFileList();
        updateStorageInfo();
      }
    };
    xhr.send(file);
  });
}

// 다운로드
function downloadFile(url, name) {
  var a = document.createElement('a');
  a.href = url; a.download = name; a.target = '_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// 삭제
function deleteFile(key) {
  if (!confirm('삭제하시겠습니까?')) return;
  var xhr = new XMLHttpRequest();
  xhr.open('DELETE', SUPABASE_URL + '/storage/v1/object/' + BUCKET, true);
  xhr.setRequestHeader('apikey', SUPABASE_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_KEY);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    fileList = fileList.filter(function(f){ return f.key !== key; });
    save(); renderFileList(); updateStorageInfo();
    showToast('삭제되었습니다');
  };
  xhr.send(JSON.stringify({ prefixes: [key] }));
}

// 이동
function moveFile(key) {
  moveTargetKey = key;
  var el = document.getElementById('move-folder-list');
  el.innerHTML = '';
  folders.filter(function(f){ return f !== '전체'; }).forEach(function(f) {
    var btn = document.createElement('button');
    btn.className = 'folder-tab';
    btn.style.cssText = 'width:100%;text-align:left;border-radius:8px;padding:10px 14px;';
    btn.textContent = f;
    btn.onclick = function() {
      fileList.forEach(function(fi){ if(fi.key === moveTargetKey) fi.folder = f; });
      save(); renderFileList();
      document.getElementById('move-modal').classList.remove('visible');
      showToast(f + ' 폴더로 이동했습니다', 'success');
    };
    el.appendChild(btn);
  });
  document.getElementById('move-modal').classList.add('visible');
}

// 이미지 미리보기
function previewImg(url) {
  document.getElementById('preview-img').src = url;
  document.getElementById('preview-overlay').classList.add('visible');
}

// 폴더 추가
function openAddFolder() {
  document.getElementById('folder-name-input').value = '';
  document.getElementById('folder-modal').classList.add('visible');
  setTimeout(function(){ document.getElementById('folder-name-input').focus(); }, 100);
}
function closeFolderModal() {
  document.getElementById('folder-modal').classList.remove('visible');
}
function addFolder() {
  var name = document.getElementById('folder-name-input').value.trim();
  if (!name) return;
  if (folders.includes(name)) { showToast('이미 있는 폴더입니다', 'error'); return; }
  folders.push(name);
  save(); renderFolders();
  closeFolderModal();
  showToast(name + ' 폴더 생성', 'success');
}

// 스토리지 정보
function updateStorageInfo() {
  var total = fileList.reduce(function(s,f){ return s+f.size; }, 0);
  document.getElementById('storage-info').textContent = fileList.length + '개 파일 · ' + fmtSize(total);
}

// 드래그앤드롭
var zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('drag-over'); });
zone.addEventListener('drop', function(e){ e.preventDefault(); zone.classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); });
document.getElementById('file-input').addEventListener('change', function(){ uploadFiles(this.files); this.value=''; });

// 폴더 모달 엔터
